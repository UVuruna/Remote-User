<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Remote User</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="status" class="connecting">Connecting…</div>
  <canvas id="screen"></canvas>

  <!-- Top-left: move the view without clicking (pinned above the keyboard) -->
  <button id="btn-pan" class="ctl corner corner-tl" type="button" aria-label="Move view (no click)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 11V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2"/>
      <path d="M14 10V4a2 2 0 0 0-2-2 2 2 0 0 0-2 2v2"/>
      <path d="M10 10.5V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2v8"/>
      <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/>
    </svg>
    <span class="lbl">Move</span>
  </button>

  <!-- Top-right: hide every control, leaving only the screen -->
  <button id="btn-hide" class="ctl corner corner-tr" type="button" aria-label="Hide controls">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9.9 4.24A9 9 0 0 1 12 4c7 0 10 8 10 8a13 13 0 0 1-1.67 2.68"/>
      <path d="M6.1 6.1A13 13 0 0 0 2 12s3 8 10 8a9 9 0 0 0 5.9-2.1"/>
      <line x1="2" y1="2" x2="22" y2="22"/>
    </svg>
    <span class="lbl">Hide</span>
  </button>

  <!-- Two D-pad groups, filled from actions.json (categories) -->
  <div id="group-left" class="group left"></div>
  <div id="group-right" class="group right"></div>

  <!-- Category picker (tap to open, tap an item to choose, X to cancel) -->
  <div id="wheel"></div>

  <input id="kb" type="text" autocapitalize="off" autocorrect="off" autocomplete="off" spellcheck="false" aria-hidden="true" tabindex="-1">

  <script src="/static/app.js"></script>
</body>
</html>
